<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fostec Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #14213d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 320px; text-align: center; }
        h2 { color: #14213d; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #fca311; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; }
        #mensagem { color: #e63946; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Acesso Fostec</h2>
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btnEntrar">ENTRAR</button>
        <p id="mensagem"></p>
    </div>

    <script>
        const _URL = "https://odtcusgyukmjlrsouxud.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kdGN1c2d5dWttamxyc291eHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjMxNTcsImV4cCI6MjA5MDYzOTE1N30.L9Ws6Ex5r22r35SsszfXA2it5t7FDfPm3Q_yZgqhyO8";
        
        // Inicialização correta
        const supabaseClient = supabase.createClient(_URL, _KEY);

        document.getElementById('btnEntrar').addEventListener('click', async () => {
            const user = document.getElementById('usuario').value;
            const pass = document.getElementById('senha').value;
            const msg = document.getElementById('mensagem');

            if(user === "fostec" && pass === "senha123") {
                msg.style.color = "orange";
                msg.innerText = "Conectando ao banco...";

                try {
                    // Tenta listar os arquivos no seu bucket 'estoques'
                    const { data, error } = await supabaseClient.storage.from('estoques').list();

                    if (error) throw error;

                    if (data && data.length > 0) {
                        // Pega o arquivo mais recente
                        const ultimo = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
                        
                        const { data: fileBlob, error: downloadError } = await supabaseClient.storage.from('estoques').download(ultimo.name);
                        
                        if (downloadError) throw downloadError;

                        const texto = await fileBlob.text();
                        localStorage.setItem('csv_nuvem', texto);
                    }

                    sessionStorage.setItem('logado', 'true');
                    window.location.href = 'index.html';

                } catch (err) {
                    console.error("Erro Supabase:", err);
                    msg.innerText = "Erro ao buscar dados. Verifique o Bucket 'estoques'.";
                }
            } else {
                msg.innerText = "Usuário ou senha incorretos.";
            }
        });
    </script>
</body>
</html>
